spring.application.name=be-mes-project

# DataSource Configuration (MySQL default, configurable via environment variables)
spring.datasource.url=${MES_DB_URL:jdbc:mysql://localhost:3306/mesdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.driver-class-name=${MES_DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${MES_DB_USERNAME:root}
spring.datasource.password=${MES_DB_PASSWORD:root}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# API JSON contract: use snake_case field names on wire.
spring.jackson.property-naming-strategy=SNAKE_CASE

# H2 Console (disabled: MySQL is the default runtime DB)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# CSV bootstrap seed
mes.seed.csv.enabled=true

# MES Simulation Configuration
# Scheduler interval for data replay (milliseconds)
mes.simulation.interval-ms=1000
# Classpath CSV path used by scheduler simulation.
mes.simulation.source-path=data/ProductionLogs.csv
